name: Update README with ML Prediction

on:
  schedule:
    # Her gece 21:00 UTC = TR saatiyle 00:00 (yaz saati farkina gore ayarla)
    - cron: "0 21 * * *"
  workflow_dispatch: {}  # elle de tetikleyebilmek icin

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu checkout et
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bagimliliklari yukle
        run: pip install -r requirements.txt

      - name: Commit verisini topla
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.actor }}
        run: python scripts/fetch_commits.py

      - name: Modeli egit ve README'yi guncelle
        run: python scripts/train_predict.py

      - name: Haftalik ozeti guncelle
        run: python scripts/weekly_summary.py

      - name: Commit takimyildizi gorselini uret
        env:
          GITHUB_USERNAME: ${{ github.actor }}
        run: python scripts/constellation.py

      - name: Degisiklikleri commit'le
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if [ -f data/commits.csv ]; then
            git add data/commits.csv
          else
            echo "Uyari: data/commits.csv olusmadi, atlaniyor."
          fi
          if [ -f assets/constellation.svg ]; then
            git add assets/constellation.svg
          fi
          git diff --cached --quiet && echo "Degisiklik yok" || git commit -m "🤖 Günlük ML tahmini + haftalık özet + takımyıldızı güncellendi"
          git push